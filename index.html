<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Movie</title>
    <!-- SEO : description affichée par Google dans les résultats de recherche -->
    <meta name="description" content="The Movie — Découvrez les derniers films à l'affiche, recherchez vos films préférés et explorez par catégorie.">

    <!-- PERFORMANCE : preconnect indique au navigateur de se connecter en avance
         aux domaines qu'on va utiliser. Ça économise ~100-300ms par domaine. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://image.tmdb.org">
    <link rel="preconnect" href="https://api.themoviedb.org">

    <!-- COHÉRENCE : on charge tous les poids (300 à 700) pour les deux pages -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top px-4">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">
                <img src="assets/img/logo.png" class="logo" alt="The Movie - Logo">
            </a>
            <!-- ACCESSIBILITÉ : aria-label décrit le rôle du formulaire pour les lecteurs d'écran -->
            <form class="d-flex" action="index.html" method="GET" aria-label="Rechercher un film">
                <input class="form-control me-2 bg-dark text-white border-secondary" type="search"
                    placeholder="Rechercher un film..." name="recherche" id="recherche"
                    aria-label="Saisir le nom d'un film">
                <button class="btn btn-outline-danger" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <header class="header">
        <div id="affiche" class="d-flex align-items-end">
            <div id="descriptionContainer" class="container">
            </div>
        </div>
    </header>

    <main class="main">
        <section class="categories-section py-4">
            <div class="container">
                <h2 class="text-white mb-3">Catégories</h2>
                <div class="categories-list d-flex gap-2 overflow-auto pb-2" id="categoriesList">
                </div>
            </div>
        </section>

        <section class="container-fluid px-5">
            <div class="row g-4 justify-content-center" id="container">
            </div>
        </section>
    </main>

    <footer class="py-5 text-center text-secondary border-top border-secondary mt-5">
        <p>&copy; 2026 The Movie - Oe oe</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- IMPORTANT : config.js DOIT être chargé AVANT script.js car il définit les constantes -->
    <script src="script/config.js"></script>
    <script src="script/home.js"></script>
</body>

</html>
